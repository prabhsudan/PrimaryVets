# separate terms of service, privacy policy, and support
# documentation.

# This workflow will build and test an ASP.NET Core application
# built on .NET 8.
# To learn more about ASP.NET Core and .NET,
# refer to https://dotnet.microsoft.com/en-us/apps/aspnet
#
# To configure this workflow:
#
# 1. Configure environment variables
# GitHub sets default environment variables for every workflow run.
# Replace the variables relative to your project in the "env" section below.
#
# 2. Docker
# If you want to build and deploy your application using Docker,
# make sure your Dockerfile exists in the root directory of the repository.
#
# For more information on GitHub Actions, refer to https://github.com/features/actions
# For a complete CI/CD sample to get started with GitHub Actions,
# refer to https://docs.github.com/en/actions

name: PrimaryVets CI/CD

on:
  push:
    branches: [ "master" ]

  pull_request:
    branches: [ "master" ]

jobs:

  build:

    strategy:
      matrix:
        configuration: [Debug, Release]

    runs-on: windows-latest  # For a list of available runner types, refer to
                             # https://help.github.com/en/actions/reference/workflow-syntax-for-github-actions#jobsjob_idruns-on

    env:
      Solution_Name: PrimaryVets.sln  # Replace with your solution name, i.e. MyWpfApp.sln.
      Configuration: ${{ matrix.configuration }}

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # Install the .NET Core workload
    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    # Add MSBuild to the PATH: https://github.com/microsoft/setup-msbuild
    - name: Setup MSBuild.exe
      uses: microsoft/setup-msbuild@v2

    # Restore the application to populate the obj folder
    - name: Restore the application
      run: dotnet restore $env:Solution_Name

    # Execute all unit tests in the solution
    - name: Execute unit tests
      run: dotnet test $env:Solution_Name --configuration $env:Configuration --no-restore

    # Build the application
    - name: Build the application
      run: dotnet build $env:Solution_Name --configuration $env:Configuration --no-restore

    # Build Docker image
    - name: Build Docker image
      run: docker build -t primaryvets:latest .

    # Display Docker images
    - name: Display Docker images
      run: docker images
